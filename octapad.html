<!DOCTYPE html><html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport"
      content="width=device-width,
               initial-scale=1.0,
               viewport-fit=cover"><title>Queen-Sujata Octapad</title><link rel="stylesheet"
      href="css/style.css">
</head><body><!-- Toolbar --><header class="toolbar"><div class="brand">

    <span class="brand-icon">
        👑
    </span>

    <span>
        Queen-Sujata
    </span>

</div>

<div class="toolbar-actions">

    <button id="kitBtn">
        🥁 Kit 1
    </button>

    <button id="menuBtn">
        ⋮
    </button>

</div>

</header><!-- Dropdown Menu --><div id="menu"
     class="menu"><button id="volumeBtn">
    🔊 Volume
</button>

<button id="fullscreenBtn">
    ⛶ Fullscreen
</button>

<button id="aboutBtn">
    ℹ About
</button>

</div><!-- Volume Panel --><div id="volumePanel"
     class="volume-panel"><h3>
    Master Volume
</h3>

<input
    type="range"
    id="volumeSlider"
    min="0"
    max="100"
    value="100">

</div><!-- Pads --><div class="grid"><div class="pad" data-index="0">
    Crash
</div>

<div class="pad" data-index="1">
    Tom
</div>

<div class="pad" data-index="2">
    Rim
</div>

<div class="pad" data-index="3">
    Clap
</div>

<div class="pad" data-index="4">
    Kick
</div>

<div class="pad" data-index="5">
    Snare
</div>

<div class="pad" data-index="6">
    O-Hat
</div>

<div class="pad" data-index="7">
    C-Hat
</div>

</div>
<script src="script/config.js"></script></body>
<script src="script/script.js"></script>
</html>
